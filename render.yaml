version: "1"

services:
  # Managed Redis Instance
  - type: redis
    name: currency-redis
    plan: free
    ipAllowList: [] # Restrict access to internal connections only for security

  # Web Service
  - type: web
    name: currency-exchange-api
    plan: free
    runtime: docker
    healthCheckPath: /health
    envVars:
      # General Configuration
      - key: ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: PROJECT_NAME
        value: "Currency Tracker Platform"
      - key: RUN_MIGRATIONS
        value: "true"
      - key: UVICORN_WORKERS
        value: "4"

      # Security Configuration
      - key: SECRET_KEY
        generateValue: true

      # CORS Configuration (exact origins only — wildcards are not supported)
      - key: BACKEND_CORS_ORIGINS
        value: "https://aero-exchange.vercel.app,https://aero-exchange-git-main.vercel.app,http://localhost:5173,http://localhost:3000"

      # PostgreSQL Database - Use full connection string from managed database
      - key: DATABASE_URL
        fromDatabase:
          name: currency-db
          property: connectionString

      # PostgreSQL Database - Individual components (fallback)
      - key: POSTGRES_SERVER
        fromDatabase:
          name: currency-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: currency-db
          property: port
      - key: POSTGRES_USER
        fromDatabase:
          name: currency-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: currency-db
          property: password
      - key: POSTGRES_DB
        fromDatabase:
          name: currency-db
          property: database

      # SSL mode for database connections (asyncpg handles via connect_args, not URL)
      - key: DATABASE_SSLMODE
        value: "require"

      # Redis Cache - Use full connection string from managed Redis
      - key: REDIS_URL
        fromService:
          type: redis
          name: currency-redis
          property: connectionString

      # Redis Cache - Individual components (fallback)
      - key: REDIS_HOST
        fromService:
          type: redis
          name: currency-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: currency-redis
          property: port
      - key: REDIS_PASSWORD
        fromService:
          type: redis
          name: currency-redis
          property: password

      # Exchange Rate API (set this value in Render Dashboard manually)
      - key: EXCHANGE_RATE_API_KEY
        sync: false

databases:
  # Managed PostgreSQL Database
  - name: currency-db
    plan: free
