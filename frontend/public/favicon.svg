      <stop offset="0%" stop-color="#0d7380"/>
      <stop offset="100%" stop-color="#0a5c66"/>
    </linearGradient>
  </defs>
  <rect width="48" height="48" rx="12" fill="url(#bg)"/>
  <g transform="translate(24,24)">
