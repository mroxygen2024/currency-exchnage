user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # --------------------------------------------------------------------------
    # Gzip Compression
    # --------------------------------------------------------------------------
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript;

    # --------------------------------------------------------------------------
    # WebSocket Mapping
    # --------------------------------------------------------------------------
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # --------------------------------------------------------------------------
    # Rate Limiting (10 requests per second per IP, with a 20 request burst)
    # --------------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # --------------------------------------------------------------------------
    # Upstream Definition for FastAPI
    # --------------------------------------------------------------------------
    upstream fastapi_app {
        server web:8000;
        keepalive 32;
    }

    # --------------------------------------------------------------------------
    # HTTP server (Development proxy - listens on 80/8080 without SSL)
    # --------------------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name localhost;

        # --------------------------------------------------------------------------
        # Security Headers
        # --------------------------------------------------------------------------
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws: wss: http:;" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        client_max_body_size 10M;

        # --------------------------------------------------------------------------
        # Routing to FastAPI (REST & WebSockets)
        # --------------------------------------------------------------------------
        location / {
            # Apply rate limiting
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://fastapi_app;
            proxy_redirect off;

            # HTTP standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # WebSocket Route (Bypasses rate limiting for active duplex streams)
        location /api/v1/currencies/ws/ {
            proxy_pass http://fastapi_app;
            proxy_redirect off;

            # Core WebSocket Upgrading headers
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Long read timeout for persistent WebSocket connections
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
