name: Continuous Deployment

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Production Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,value=${{ github.sha }}
            type=ref,event=tag

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production VPS
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Deploy & Healthcheck with Auto-Rollback
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
          VPS_USER: ${{ secrets.VPS_SSH_USER }}
          IMAGE_TAG: ${{ github.sha }}
          REGISTRY_PATH: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          # Copy docker-compose.prod.yml and nginx configs to the VPS server
          ssh $VPS_USER@$VPS_IP "mkdir -p /app/currency-tracker/docker"
          scp docker-compose.prod.yml $VPS_USER@$VPS_IP:/app/currency-tracker/docker-compose.prod.yml
          scp docker/nginx.conf $VPS_USER@$VPS_IP:/app/currency-tracker/docker/nginx.conf

          # Execute remote deployment script
          ssh $VPS_USER@$VPS_IP "bash -s" << 'EOF'
            set -e
            cd /app/currency-tracker

            # 1. Login to Registry from VPS
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # 2. Backup current running version tag for potential rollback
            PREVIOUS_TAG=$(docker inspect --format='{{.Config.Image}}' currency_tracker_web_prod 2>/dev/null | cut -d':' -f2 || echo "latest")
            echo "Currently running tag: $PREVIOUS_TAG"
            echo "Deploying new tag: ${{ env.IMAGE_TAG }}"

            # 3. Create .env file with secrets
            cat << ENVEOF > .env
            PROJECT_NAME="Currency Tracker Platform"
            ENV="production"
            DEBUG=false
            SECRET_KEY="${{ secrets.SECRET_KEY }}"
            POSTGRES_USER="${{ secrets.POSTGRES_USER }}"
            POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
            POSTGRES_DB="${{ secrets.POSTGRES_DB }}"
            REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}"
            DOCKER_REGISTRY="${{ env.REGISTRY }}"
            DOCKER_REPOSITORY="${{ env.IMAGE_NAME }}"
            IMAGE_TAG="${{ env.IMAGE_TAG }}"
            RUN_MIGRATIONS=true
            UVICORN_WORKERS=4
          ENVEOF

            # 4. Pull new image
            docker compose -f docker-compose.prod.yml pull

            # 5. Start new containers (Web application will run migrations on entrypoint)
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # 6. Verify Health of Web App
            echo "Starting post-deployment health check polling..."
            HEALTHY=false
            for i in {1..12}; do
              # We query localhost:8000 since internal port is mapped or curl from container
              # Or check healthcheck status via docker inspect
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' currency_tracker_web_prod 2>/dev/null || echo "unhealthy")
              if [ "$STATUS" = "healthy" ]; then
                echo "Healthcheck passed! Service is healthy."
                HEALTHY=true
                break
              fi
              echo "Waiting for healthcheck to pass (attempt $i/12, current status: $STATUS)..."
              sleep 5
            done

            if [ "$HEALTHY" = "false" ]; then
              echo "Healthcheck FAILED! Initiating automatic rollback to version: $PREVIOUS_TAG..."
              
              # Re-create .env file with previous tag
              sed -i "s/IMAGE_TAG=.*/IMAGE_TAG=$PREVIOUS_TAG/g" .env
              
              # Re-deploy previous working version
              docker compose -f docker-compose.prod.yml up -d
              
              echo "Rollback complete."
              exit 1
            fi

            echo "Deployment successfully verified!"
          EOF
