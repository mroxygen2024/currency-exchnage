name: Continuous Integration

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ----------------------------------------------------------------------------
  # Backend: Lint, Type Check, Test
  # ----------------------------------------------------------------------------
  backend:
    name: Backend - Lint, Test
    runs-on: ubuntu-latest
    env:
      ENV: testing
      SECRET_KEY: "temporary_test_secret_key_which_is_sufficiently_long_for_hs256_compliance"
      ALGORITHM: HS256
      POSTGRES_SERVER: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: currency_tracker_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: currency_tracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov bandit

      - name: Run Ruff Linting
        run: ruff check .

      - name: Run Ruff Formatting Check
        run: ruff format --check .

      - name: Run Static Security Analysis (Bandit)
        run: bandit -r app/ -ll

      - name: Run Pytest with Coverage
        run: |
          PYTHONPATH=. pytest --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      - name: Upload Test Coverage Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-report
          path: coverage.xml
          if-no-files-found: ignore

  # ----------------------------------------------------------------------------
  # Frontend: Lint, Type Check, Test
  # ----------------------------------------------------------------------------
  frontend:
    name: Frontend - Lint, Type Check, Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      - name: Run TypeScript Type Checking
        working-directory: frontend
        run: npx tsc -b

      - name: Run Vitest Unit Tests
        working-directory: frontend
        run: npm test

  # ----------------------------------------------------------------------------
  # Docker: Build & Validate
  # ----------------------------------------------------------------------------
  docker:
    name: Docker - Build & Validate
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose Configuration
        run: docker compose config

      - name: Validate Production Docker Compose Configuration
        run: docker compose -f docker-compose.prod.yml config --quiet || echo "Production compose has unresolved vars (expected)"

      - name: Build Backend Docker Image
        run: docker build . --file Dockerfile --tag currency-tracker-web:test

      - name: Build Frontend Docker Image
        run: docker build ./frontend --file frontend/Dockerfile --tag currency-tracker-frontend:test
