name: Continuous Integration

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test-and-validate:
    name: Lint, Test, & Docker Build
    runs-on: ubuntu-latest
    env:
      ENV: testing
      SECRET_KEY: "temporary_test_secret_key_which_is_sufficiently_long_for_hs256_compliance"
      ALGORITHM: HS256

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov bandit

      - name: Run Ruff Linting
        run: ruff check .

      - name: Run Ruff Formatting Check
        run: ruff format --check .

      - name: Run Static Security Analysis (Bandit)
        run: bandit -r app/ -ll

      - name: Run Pytest with Coverage (Fail under 80%)
        run: |
          PYTHONPATH=. pytest --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      - name: Validate Docker Compose Configuration
        run: |
          docker compose config

      - name: Build Docker Image
        run: |
          docker build . --file Dockerfile --tag currency-tracker-web:test

      - name: Upload Test Coverage Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-coverage-report
          path: coverage.xml
          if-no-files-found: ignore
