version: '3.8'

services:
  # ----------------------------------------------------------------------------
  # PostgreSQL Database (Restricted to Internal Network)
  # ----------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: currency_tracker_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # No ports exposed to host. Secure by default.
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - app_network_prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------------
  # Redis Cache (Restricted to Internal Network)
  # ----------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: currency_tracker_redis_prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1 --loglevel warning
    # No ports exposed to host. Secure by default.
    volumes:
      - redis_data_prod:/data
    networks:
      - app_network_prod
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------------
  # FastAPI Web Application
  # ----------------------------------------------------------------------------
  web:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_REPOSITORY:-currency-tracker}/web:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: currency_tracker_web_prod
    restart: always
    command: /app/start.sh
    environment:
      ENV: production
      DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RUN_MIGRATIONS: "true"  # Run Alembic migrations on startup
      UVICORN_WORKERS: ${UVICORN_WORKERS:-4}
    # In production, we do NOT bind mount the source code folder.
    # The container runs the immutable, pre-built codebase.
    volumes:
      - app_logs_prod:/app/logs
    networks:
      - app_network_prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ----------------------------------------------------------------------------
  # Celery Worker (Taskiq Worker)
  # ----------------------------------------------------------------------------
  celery_worker:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_REPOSITORY:-currency-tracker}/web:${IMAGE_TAG:-latest}
    container_name: currency_tracker_worker_prod
    restart: always
    command: /app/celery.sh
    environment:
      ENV: production
      SECRET_KEY: ${SECRET_KEY}
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RUN_MIGRATIONS: "false"
    volumes:
      - app_logs_prod:/app/logs
    networks:
      - app_network_prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'taskiq worker' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ----------------------------------------------------------------------------
  # Celery Beat (Taskiq Scheduler)
  # ----------------------------------------------------------------------------
  celery_beat:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_REPOSITORY:-currency-tracker}/web:${IMAGE_TAG:-latest}
    container_name: currency_tracker_beat_prod
    restart: always
    command: /app/beat.sh
    environment:
      ENV: production
      SECRET_KEY: ${SECRET_KEY}
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RUN_MIGRATIONS: "false"
    volumes:
      - app_logs_prod:/app/logs
    networks:
      - app_network_prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ----------------------------------------------------------------------------
  # Nginx Reverse Proxy (HTTPS / SSL Enforced)
  # ----------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: currency_tracker_proxy_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs_prod:/var/log/nginx
      - letsencrypt_certs:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
    networks:
      - app_network_prod
    depends_on:
      - web

  # ----------------------------------------------------------------------------
  # Certbot (Let's Encrypt automated renewal)
  # ----------------------------------------------------------------------------
  certbot:
    image: certbot/certbot:v2.9.0
    container_name: currency_tracker_certbot
    restart: unless-stopped
    volumes:
      - letsencrypt_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit 0 SIGTERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - app_network_prod

# ------------------------------------------------------------------------------
# Persistent Network and Volume Configurations
# ------------------------------------------------------------------------------
networks:
  app_network_prod:
    driver: bridge

volumes:
  postgres_data_prod:
    driver: local
  redis_data_prod:
    driver: local
  app_logs_prod:
    driver: local
  nginx_logs_prod:
    driver: local
  letsencrypt_certs:
    driver: local
  certbot_www:
    driver: local
